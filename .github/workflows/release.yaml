name: Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g., sznm_lints)'
        required: false
        default: ''
      version:
        description: 'Version to release (e.g., 2.0.0). Leave empty for automatic versioning based on conventional commits.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tags_created: ${{ steps.release.outputs.tags_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: koji-1009/setup-flutter@v1
        with:
          flutter-version-file: '.fvmrc'

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: dart run melos bootstrap

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Release Version
        id: release
        run: |
          if [ -n "${{ github.event.inputs.version }}" ] && [ -n "${{ github.event.inputs.package }}" ]; then
            # Manual version override
            echo "Manual version: ${{ github.event.inputs.package }}:${{ github.event.inputs.version }}"
            dart --disable-dart-dev pub global run melos version \
              --manual-version="${{ github.event.inputs.package }}:${{ github.event.inputs.version }}" \
              --yes
          else
            # Automatic versioning from commits
            echo "Automatic versioning from commits"
            dart --disable-dart-dev pub global run melos version --yes
          fi
          
          # Capture created tags
          echo "tags_created=$(git tag --points-at HEAD | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT
          
          # Check if any tags were created
          if git tag --points-at HEAD | grep -q .; then
            echo "releases_created=true" >> $GITHUB_OUTPUT
          else
            echo "releases_created=false" >> $GITHUB_OUTPUT
            echo "No version changes detected. Commit with conventional commit message (feat:, fix:, etc.)"
          fi
        continue-on-error: true

      - name: Push Version Changes
        run: |
          git push --follow-tags

