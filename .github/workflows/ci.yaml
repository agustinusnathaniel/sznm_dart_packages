name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup FVM
        uses: leoafarias/fvm-action@v1
        with:
          flutter-version: 3.41.5

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: fvm dart run melos bootstrap

      - name: Check Format
        run: fvm dart run melos run format-check

      - name: Analyze
        run: fvm dart run melos run analyze

  verify:
    name: Verify Publish Readiness
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup FVM
        uses: leoafarias/fvm-action@v1
        with:
          flutter-version: 3.41.5

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: fvm dart run melos bootstrap

      - name: Run Verification
        run: ./scripts/verify.sh

      - name: Publish Dry-Run
        run: fvm dart run melos run publish-dry-run
