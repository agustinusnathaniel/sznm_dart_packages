name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1.7.2

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Use Flutter Version from .fvmrc
        run: fvm use

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: fvm dart run melos bootstrap

      - name: Check Format
        run: fvm dart run melos run format-check

      - name: Analyze
        run: fvm dart run melos run analyze

  verify:
    name: Verify Publish Readiness
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1.7.2

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Use Flutter Version from .fvmrc
        run: fvm use

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: fvm dart run melos bootstrap

      - name: Run Verification
        run: ./scripts/verify.sh

      - name: Publish Dry-Run
        run: fvm dart run melos run publish-dry-run
