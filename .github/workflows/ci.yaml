name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: koji-1009/setup-flutter@v1
        with:
          flutter-version-file: '.fvmrc'

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: dart run melos bootstrap

      - name: Check Format
        run: dart run melos run format-check

      - name: Analyze
        run: dart run melos run analyze

  verify:
    name: Verify Publish Readiness
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: koji-1009/setup-flutter@v1
        with:
          flutter-version-file: '.fvmrc'

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: dart run melos bootstrap

      - name: Run Verification
        run: ./scripts/verify.sh

      - name: Publish Dry-Run
        run: dart run melos run publish-dry-run
