name: Publish to pub.dev

on:
  push:
    tags:
      - "sznm_lints-v*"

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup FVM
        uses: leoafarias/fvm-action@v1
        with:
          flutter-version: 3.41.5

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: fvm dart run melos bootstrap

      - name: Verify Publish Readiness
        run: fvm dart run melos run publish-dry-run

      - name: Publish to pub.dev
        working-directory: packages/sznm_lints
        run: fvm dart pub publish --force
